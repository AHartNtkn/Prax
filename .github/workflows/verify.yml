name: verify

on:
  push:
    branches: [master]
  pull_request:

# ONE job, both toolchains, running scripts/verify.sh — the same entry point a
# developer runs locally, so CI and `./scripts/verify.sh` cannot drift.
#
# The split into a rust job and a haskell job died at S7 slice 0: the
# comparator's end-to-end harness tests DRIVE THE FROZEN ORACLE as a subprocess
# (`cabal run -v0 prax-oracle`), and scripts/golden-check.sh re-derives the four
# goldens from that same oracle. Splitting the toolchains would have meant
# either skipping those tests in CI — an implicit skip, which is invisible
# technical debt — or maintaining a second, weaker definition of "verified".
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10'
          cabal-version: 'latest'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('prax.cabal') }}
          restore-keys: cabal-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: cabal update
        run: cabal update

      - name: verify (freeze-check, oracle, golden-check, cabal test, cargo)
        run: ./scripts/verify.sh
